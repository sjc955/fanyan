<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>城市全能裝修報價系統 - @fanyan</title>
    <style>
        :root { --main: #2c3e50; --accent: #3498db; --line: #00c300; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main); border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .section-title { background: #e9ecef; padding: 10px; margin-top: 20px; font-weight: bold; color: var(--main); border-radius: 5px; display: flex; justify-content: space-between; }
        .item-row { display: flex; align-items: center; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-label { flex: 3; font-size: 0.95em; }
        .item-unit { flex: 1; color: #888; font-size: 0.8em; text-align: center; }
        input[type="number"] { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: right; }
        .btn-calc { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #result-box { display: none; margin-top: 30px; padding: 25px; background: #fffbe6; border: 2px solid #ffe58f; border-radius: 10px; }
        .line-btn { background: var(--line); text-decoration: none; display: block; text-align: center; color: white; padding: 18px; border-radius: 8px; font-size: 1.3em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 城市全能裝修報價系統</h2>
    <div style="margin-bottom: 20px;">📍 施工地址：<input type="text" id="address" style="width:70%; padding:8px;" placeholder="請輸入地址"></div>

    <div class="section-title"><span>🏗️ 拆除/清運/老屋更新</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">天花板拆除 (含燈具)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="800" data-high="1200"></div>
    <div class="item-row"><div class="item-label">全屋電線重拉 (含面板)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="3500" data-high="6000"></div>
    <div class="item-row"><div class="item-label">廢棄物清運 (3.5噸車)</div><div class="item-unit">車</div><input type="number" class="calc" data-low="12000" data-high="18000"></div>

    <div class="section-title"><span>🪵 地面工程 (卡扣/橡木)</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">SPC 石塑卡扣地板</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="2800" data-high="4500"></div>
    <div class="item-row"><div class="item-label">實木橡木地板 (頂級)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="9000" data-high="16000"></div>

    <div class="section-title"><span>🚿 廚衛/木作/油漆</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">浴室全面翻修 (含設備)</div><div class="item-unit">間</div><input type="number" class="calc" data-low="135000" data-high="220000"></div>
    <div class="item-row"><div class="item-label">平釘矽酸鈣天花板</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="3800" data-high="5200"></div>
    <div class="item-row"><div class="item-label">牆面乳膠漆 (2底3面)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="1500" data-high="2500"></div>

    <button class="btn-calc" onclick="finalCalc()">🔥 產出即時總預算報價</button>

    <div id="result-box">
        <h3 style="color:#d35400;">📄 報價試算清單</h3>
        <div id="details"></div>
        <hr>
        <p style="font-size:26px; color:#c0392b;"><strong>預估總計：NT$ <span id="total-val">0</span></strong></p>
        <p><strong>⚠️ 以上為初估價錢</strong></p>
        <a href="https://line.me" class="line-btn">🟢 加入 LINE 官方：＠fanyan</a>
    </div>
</div>
<script>
function finalCalc() {
    let inputs = document.querySelectorAll('.calc'), totalL = 0, totalH = 0, detailHTML = "";
    inputs.forEach(el => {
        let val = parseFloat(el.value) || 0;
        if (val > 0) {
            let L = val * parseFloat(el.dataset.low), H = val * parseFloat(el.dataset.high);
            totalL += L; totalH += H;
            detailHTML += `✅ ${el.parentElement.querySelector('.item-label').innerText}: $${L.toLocaleString()} ~ $${H.toLocaleString()}<br>`;
        }
    });
    if (totalL === 0) return alert("請輸入數量！");
    document.getElementById('details').innerHTML = detailHTML;
    document.getElementById('total-val').innerText = totalL.toLocaleString() + " ~ " + totalH.toLocaleString();
    document.getElementById('result-box').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>

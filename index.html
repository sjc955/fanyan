<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市全能裝修報價系統 - ＠fanyan</title>
    <style>
        :root { --main-color: #2c3e50; --accent-color: #3498db; --line-green: #00c300; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; }
        .section-title { background: #eee; padding: 10px; margin-top: 20px; font-weight: bold; color: var(--main-color); border-radius: 5px; display: flex; justify-content: space-between; }
        .item-row { display: flex; align-items: center; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-label { flex: 3; font-size: 0.95em; }
        .item-unit { flex: 1; color: #888; font-size: 0.85em; text-align: center; }
        .item-input { flex: 1.5; }
        input[type="number"], input[type="text"] { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: right; }
        .btn-calc { width: 100%; padding: 20px; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #result-box { display: none; margin-top: 30px; padding: 25px; background: #fffbe6; border: 2px solid #ffe58f; border-radius: 10px; }
        .line-btn { background: var(--line-green); text-decoration: none; display: block; text-align: center; color: white; padding: 18px; border-radius: 8px; font-size: 1.3em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 城市全能裝修報價系統</h2>
    <div style="margin-bottom: 20px;"><label>📍 施工地點 (地址)：</label><input type="text" id="address" placeholder="請輸入欲裝修之地址"></div>
    <div class="section-title"><span>🏗️ 拆除與清運工程</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">天花板拆除 (含燈具)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="800" data-high="1200"></div>
    <div class="item-row"><div class="item-label">廢棄物清運 (3.5噸車)</div><div class="item-unit">車</div><input type="number" class="calc" data-low="12000" data-high="18000"></div>
    <div class="section-title"><span>🪵 地坪工程 (卡扣與橡木)</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">SPC 石塑卡扣地板</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="2800" data-high="4500"></div>
    <div class="item-row"><div class="item-label">實木橡木地板 (頂級)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="9000" data-high="16000"></div>
    <div class="section-title"><span>🚿 廚衛與水電翻新</span><span>單位</span></div>
    <div class="item-row"><div class="item-label">浴室翻修懶人包 (全含)</div><div class="item-unit">間</div><input type="number" class="calc" data-low="135000" data-high="220000"></div>
    <div class="item-row"><div class="item-label">全屋電線重拉 (含面板)</div><div class="item-unit">坪</div><input type="number" class="calc" data-low="3500" data-high="6000"></div>
    <button class="btn-calc" onclick="finalCalc()">🔥 獲取即時報價</button>
    <div id="result-box">
        <h3 style="color: #d35400;">📄 報價試算結果</h3>
        <div id="details"></div>
        <hr>
        <p style="font-size: 24px; color: #c0392b;"><strong>預估總計：NT$ <span id="total-val">0</span></strong></p>
        <p><strong>⚠️ 以上為初估價錢</strong><br>實際費用將依現場屋況為準。</p>
        <input type="text" id="cust-name" placeholder="您的稱呼" style="margin-bottom:10px;"><br>
        <input type="text" id="cust-phone" placeholder="您的聯絡電話"><br>
        <a href="https://line.me" class="line-btn">🟢 加入我的 LINE 官方 (@fanyan)</a>
    </div>
</div>
<script>
function finalCalc() {
    let inputs = document.querySelectorAll('.calc');
    let totalL = 0, totalH = 0, detailHTML = "";
    inputs.forEach(el => {
        let val = parseFloat(el.value) || 0;
        if (val > 0) {
            let L = val * parseFloat(el.dataset.low);
            let H = val * parseFloat(el.dataset.high);
            let name = el.parentElement.querySelector('.item-label').innerText;
            totalL += L; totalH += H;
            detailHTML += `✅ ${name}: $${L.toLocaleString()} ~ $${H.toLocaleString()}<br>`;
        }
    });
    if (totalL === 0) { alert("請輸入至少一項數量！"); return; }
    document.getElementById('details').innerHTML = detailHTML;
    document.getElementById('total-val').innerText = totalL.toLocaleString() + " ~ " + totalH.toLocaleString();
    document.getElementById('result-box').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>

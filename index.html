<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市全能裝修報價系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        input { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: right; }
        button { width: 100%; padding: 18px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        #result-box { display: none; margin-top: 20px; padding: 20px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; }
        .line-btn { background: #00c300; text-decoration: none; display: block; text-align: center; color: white; padding: 15px; border-radius: 8px; font-size: 1.2em; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 城市全能裝修報價系統</h2>
    <div style="margin-bottom: 15px;">📍 地址：<input type="text" id="address" style="width: 70%; text-align: left;" placeholder="輸入施工地址"></div>
    <div class="item-row"><span>卡扣地板 (坪)</span><input type="number" class="calc" data-l="2800" data-h="4500"></div>
    <div class="item-row"><span>實木橡木地板 (坪)</span><input type="number" class="calc" data-l="9000" data-h="16000"></div>
    <div class="item-row"><span>浴室翻修 (間)</span><input type="number" class="calc" data-l="135000" data-h="220000"></div>
    <div class="item-row"><span>電線重拉 (坪)</span><input type="number" class="calc" data-l="3500" data-h="6000"></div>
    <div class="item-row"><span>天花板拆除 (坪)</span><input type="number" class="calc" data-l="800" data-h="1200"></div>
    <button onclick="calculate()">🔥 產出即時報價單</button>
    <div id="result-box">
        <div id="details"></div>
        <hr>
        <p style="font-size: 20px; color: #c0392b;"><strong>總計預算：NT$ <span id="total-val">0</span></strong></p>
        <p><strong>⚠️ 以上為初估價錢</strong></p>
        <input type="text" placeholder="您的姓名" style="width: 95%; margin-bottom: 10px; text-align: left;"><br>
        <input type="text" placeholder="您的電話" style="width: 95%; text-align: left;"><br>
        <a href="https://line.me" class="line-btn">🟢 加入 LINE 官方：＠fanyan</a>
    </div>
</div>
<script>
function calculate() {
    let inputs = document.querySelectorAll('.calc'), low = 0, high = 0, txt = "";
    inputs.forEach(el => {
        let v = parseFloat(el.value) || 0;
        if (v > 0) {
            let l = v * parseFloat(el.dataset.l), h = v * parseFloat(el.dataset.h);
            low += l; high += h;
            txt += "✅ " + el.parentElement.querySelector('span').innerText + ": $" + l.toLocaleString() + " ~ $" + h.toLocaleString() + "<br>";
        }
    });
    if (low === 0) return alert("請輸入數量！");
    document.getElementById('details').innerHTML = txt;
    document.getElementById('total-val').innerText = low.toLocaleString() + " ~ " + high.toLocaleString();
    document.getElementById('result-box').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>

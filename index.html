<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市裝修報價系統</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .row { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        #res { display: none; margin-top: 20px; background: #fffbe6; padding: 15px; border: 1px solid #ffe58f; }
        .line { display: block; text-align: center; background: #00c300; color: white; padding: 15px; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2>🏠 城市全能裝修報價</h2>
    <div class="row">📍 地址：<input type="text" id="addr" placeholder="請輸入施工地址"></div>
    <div class="row">🪵 卡扣地板 (坪)：<input type="number" class="item" data-l="2800" data-h="4500"></div>
    <div class="row">🪵 橡木地板 (坪)：<input type="number" class="item" data-l="9000" data-h="16000"></div>
    <div class="row">🚿 浴室翻新 (間)：<input type="number" class="item" data-l="135000" data-h="220000"></div>
    <div class="row">⚡ 電線重拉 (坪)：<input type="number" class="item" data-l="3500" data-h="6000"></div>
    <button onclick="calc()">🔥 點我獲取報價</button>
    <div id="res">
        <div id="out"></div>
        <p><strong>⚠️ 以上為初估價錢</strong></p>
        <input type="text" placeholder="您的姓名" style="margin-bottom:10px;"><br>
        <input type="text" placeholder="您的聯絡電話"><br>
        <a href="https://line.me" class="line">✅ 加入 LINE 官方 (@fanyan)</a>
    </div>
</div>
<script>
function calc() {
    let all = document.querySelectorAll('.item'), L = 0, H = 0, txt = "";
    all.forEach(i => {
        let v = parseFloat(i.value) || 0;
        if(v > 0) {
            let low = v * i.dataset.l, high = v * i.dataset.h;
            L += low; H += high;
            txt += "✔️ " + i.parentElement.innerText.split('(')[0] + ": $" + low.toLocaleString() + " ~ $" + high.toLocaleString() + "<br>";
        }
    });
    if(L === 0) return alert("請輸入數量");
    document.getElementById('out').innerHTML = txt + "<hr><h3>總計：$" + L.toLocaleString() + " ~ $" + H.toLocaleString() + "</h3>";
    document.getElementById('res').style.display = 'block';
}
</script>
</body>
</html>
